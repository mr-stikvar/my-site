<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Канал | Видео и Монтаж</title>
    <style>
        /* Базовые настройки */
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #0d1117;
            color: #f0f6fc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.5;
        }

        /* Шапка */
        header {
            padding: 40px 20px;
            text-align: center;
            background: #161b22;
            border-bottom: 1px solid #30363d;
        }

        h1 {
            margin: 0;
            font-size: 1.8rem;
            color: #58a6ff;
        }

        .sub-text {
            color: #8b949e;
            margin: 10px 0 20px;
            font-size: 1rem;
        }

        /* Кнопка */
        .btn {
            display: inline-block;
            background-color: #238636;
            color: #ffffff;
            padding: 12px 28px;
            text-decoration: none;
            border-radius: 2em;
            /* Закругленная как в мобилках */
            font-weight: 600;
            font-size: 1rem;
            transition: 0.2s;
        }

        .btn:hover {
            background-color: #2ea043;
            transform: scale(1.05);
        }

        /* Контейнер и Сетка */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        h2 {
            font-size: 1.4rem;
            margin-top: 20px;
            border-left: 4px solid #58a6ff;
            padding-left: 10px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        /* Карточка видео */
        .video-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            overflow: hidden;
            transition: 0.3s;
        }

        .video-card:hover {
            border-color: #58a6ff;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            /* 16:9 Aspect Ratio */
            height: 0;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .card-info {
            padding: 15px;
        }

        .card-info h3 {
            margin: 0;
            font-size: 1.1rem;
        }

        /* Адаптив для мелких экранов */
        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
            }

            .video-grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 10px;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>Добро пожаловать!</h1>
        <p class="sub-text">Тут мои лучшие видео и крутой монтаж из CapCut</p>
        <a href="https://youtube.com/channel/UC4UReUM_Mm4jOzDnbfx0gAw" class="btn" target="_blank">Мой YouTube Канал</a>
    </header>

    <div class="container">
        <h2>Последние работы 🎬</h2>

        <div class="video-grid">
            <div class="video-card">
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/XXXXXX" allowfullscreen></iframe>
                </div>
                <div class="card-info">
                    <h3>Крутой момент #1</h3>
                </div>
            </div>

            <div class="video-card">
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/YYYYYY" allowfullscreen></iframe>
                </div>
                <div class="card-info">
                    <h3>Монтаж в CapCut</h3>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
